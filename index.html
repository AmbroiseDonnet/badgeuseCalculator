<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>projet-badgeuse</title>
        <link href="./style.css" rel="stylesheet" />
        <script src="src/main.ts" defer></script>
    </head>
    <body>
        <h1>Ne manquez pas les moments de badgez :</h1>

        <ul>
            <li>Rentrez l'horaire de début</li>
            <li>Rentrer la durée de la pause midi</li>
            <li>Le nombre d'heures à faire dans la journée</li>
            <li>Les tranches d'heures</li>
            <li>Calculez votre badgeuse !</li>
        </ul>
        <div>
            <form>
                <label for="start-time">Horaire de début :</label>
                <input type="time" id="start-time" name="start-time" required />

                <label for="lunch-break">Durée de la pause midi (en minutes) :</label>
                <input type="number" id="lunch-break" name="lunch-break" required />

                <label for="work-hours">Nombre d'heures à faire dans la journée :</label>
                <input type="time" id="work-hours" name="work-hours" required />

                <button type="button" id="submitButton">Calculer l'horaire pour badger</button>
            </form>
            <aside id="result" class="hidden">
            </aside>
        </div>
    </body>
</html>
